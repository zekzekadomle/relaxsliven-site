backend:
  name: git-gateway
  branch: main

media_folder: "photos"
public_folder: "photos"

locale: bg

collections:

  # ── НАСТРОЙКИ НА САЙТА ──────────────────────────────────────────────
  - name: "settings"
    label: "⚙️ Настройки на сайта"
    files:
      - name: "contact"
        label: "Контактна информация"
        file: "data/contact.json"
        fields:
          - {label: "Директор", name: director, widget: string}
          - {label: "Телефон", name: phone, widget: string}
          - {label: "Имейл 1", name: email1, widget: string}
          - {label: "Имейл 2", name: email2, widget: string, required: false}
          - {label: "Адрес", name: address, widget: string}
          - {label: "Facebook URL", name: facebook, widget: string, required: false}
          - {label: "Instagram URL", name: instagram, widget: string, required: false}

      - name: "hero"
        label: "Начална страница — Hero"
        file: "data/hero.json"
        fields:
          - {label: "Заглавие ред 1", name: title1, widget: string, hint: "напр. АКАДЕМИЯ"}
          - {label: "Заглавие ред 2 (злато)", name: title2, widget: string, hint: "напр. РЕЛАКС"}
          - {label: "Подзаглавие", name: subtitle, widget: text}
          - {label: "Брой учебни бази", name: stat_bases, widget: number}
          - {label: "Брой преподаватели", name: stat_teachers, widget: number}
          - {label: "Брой дипломирани", name: stat_graduates, widget: string, hint: "напр. 2000+"}
          - {label: "Брой специалности", name: stat_specialties, widget: number}

  # ── ПРЕПОДАВАТЕЛИ ПО ОБЛАСТИ ─────────────────────────────────────────
  - name: "specialists"
    label: "👩‍🏫 Преподаватели"
    label_singular: "Преподавател"
    files:
      - name: "all"
        label: "Всички преподаватели"
        file: "data/specialists.json"
        fields:
          - label: "Области"
            name: "."
            widget: "object"
            fields:
              - label: "Благоевград"
                name: "Благоевград"
                widget: list
                label_singular: "Преподавател"
                fields:
                  - {label: "Имена", name: name, widget: string}
                  - {label: "Телефон 1", name: phone1, widget: string, required: false}
                  - {label: "Телефон 2", name: phone2, widget: string, required: false}
                  - label: "Специалности"
                    name: specialties
                    widget: select
                    multiple: true
                    required: false
                    options:
                      - {label: "Маникюр, педикюр и ноктопластика", value: "Маникюр & Ноктопластика"}
                      - {label: "Фризьорство", value: "Фризьорство"}
                      - {label: "Бръснаро-фризьорство", value: "Бръснаро-фризьорство"}
