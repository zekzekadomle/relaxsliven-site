backend:
  name: git-gateway
  branch: main

media_folder: "photos"
public_folder: "/photos"

locale: bg

collections:

  # ── НАСТРОЙКИ ────────────────────────────────────────────────────────
  - name: "settings"
    label: "⚙️ Настройки на сайта"
    files:

      - name: "hero"
        label: "🏠 Начална страница"
        file: "data/hero.json"
        fields:
          - {label: "Заглавие ред 1 (бяло)", name: title1, widget: string, hint: "напр. АКАДЕМИЯ"}
          - {label: "Заглавие ред 2 (злато)", name: title2, widget: string, hint: "напр. РЕЛАКС"}
          - {label: "Подзаглавие", name: subtitle, widget: text}
          - {label: "Фоново изображение на Hero", name: hero_image, widget: image, required: false, media_folder: "/photos", public_folder: "/photos"}
          - {label: "Брой учебни бази", name: stat_bases, widget: number, value_type: int}
          - {label: "Брой преподаватели", name: stat_teachers, widget: number, value_type: int}
          - {label: "Брой дипломирани", name: stat_graduates, widget: string, hint: "напр. 2000+"}
          - {label: "Брой специалности", name: stat_specialties, widget: number, value_type: int}


      - name: "obucheniya"
        label: "📄 Обучения"
        file: "data/page-obucheniya.json"
        fields:
          - {label: "Малък таг (горе)", name: tag, widget: string, hint: "напр. Обучения"}
          - {label: "Заглавие", name: title, widget: string, hint: "Главното заглавие на страницата"}
          - {label: "Подзаглавие (незадължително)", name: subtitle, widget: string, required: false}

      - name: "za-nas"
        label: "📄 За нас"
        file: "data/page-za-nas.json"
        fields:
          - {label: "Малък таг (горе)", name: tag, widget: string, hint: "напр. Обучения"}
          - {label: "Заглавие", name: title, widget: string, hint: "Главното заглавие на страницата"}
          - {label: "Подзаглавие (незадължително)", name: subtitle, widget: string, required: false}

      - name: "uchebni-bazi"
        label: "📄 Учебни бази"
        file: "data/page-uchebni-bazi.json"
        fields:
          - {label: "Малък таг (горе)", name: tag, widget: string, hint: "напр. Обучения"}
          - {label: "Заглавие", name: title, widget: string, hint: "Главното заглавие на страницата"}
          - {label: "Подзаглавие (незадължително)", name: subtitle, widget: string, required: false}

      - name: "zapisvane"
        label: "📄 Запишете се"
        file: "data/page-zapisvane.json"
        fields:
          - {label: "Малък таг (горе)", name: tag, widget: string, hint: "напр. Обучения"}
          - {label: "Заглавие", name: title, widget: string, hint: "Главното заглавие на страницата"}
          - {label: "Подзаглавие (незадължително)", name: subtitle, widget: string, required: false}

      - name: "kontakti"
        label: "📄 Контакти"
        file: "data/page-kontakti.json"
        fields:
          - {label: "Малък таг (горе)", name: tag, widget: string, hint: "напр. Обучения"}
          - {label: "Заглавие", name: title, widget: string, hint: "Главното заглавие на страницата"}
          - {label: "Подзаглавие (незадължително)", name: subtitle, widget: string, required: false}
      - name: "contact"
        label: "📞 Контактна информация"
        file: "data/contact.json"
        fields:
          - {label: "Директор", name: director, widget: string}
          - {label: "Телефон", name: phone, widget: string}
          - {label: "Имейл 1", name: email1, widget: string}
          - {label: "Имейл 2", name: email2, widget: string, required: false}
          - {label: "Адрес", name: address, widget: string}
          - {label: "Facebook URL", name: facebook, widget: string, required: false}
          - {label: "Instagram URL", name: instagram, widget: string, required: false}

  # ── ПРЕПОДАВАТЕЛИ ПО ОБЛАСТИ ─────────────────────────────────────────
  - name: "all-specialists"
    label: "👥 Всички преподаватели"
    label_singular: "Преподавател"
    folder: "data/regions/sliven"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: name
    fields:
      - {label: "Активен", name: active, widget: boolean, default: true}
      - {label: "Имена", name: name, widget: string}
      - {label: "Телефон 1", name: phone1, widget: string, required: false}
      - {label: "Телефон 2", name: phone2, widget: string, required: false}
      - label: "Специалности"
        name: specialties
        widget: select
        multiple: true
        required: false
        options:
          - {label: "Маникюр, педикюр и ноктопластика", value: "Маникюр & Ноктопластика"}
          - {label: "Фризьорство", value: "Фризьорство"}
          - {label: "Бръснаро-фризьорство", value: "Бръснаро-фризьорство"}
          - {label: "Козметика", value: "Козметика"}
          - {label: "Масаж", value: "Масаж"}
          - {label: "Миглопластика", value: "Миглопластика"}
          - {label: "Микроблейдинг", value: "Микроблейдинг"}
          - {label: "Грим", value: "Грим"}
          - {label: "Перманентен грим", value: "Перманентен грим"}
          - {label: "Спорт", value: "Спорт"}
      - {label: "Профилна снимка", name: photo, widget: image, required: false, media_folder: "/photos", public_folder: "/photos"}

